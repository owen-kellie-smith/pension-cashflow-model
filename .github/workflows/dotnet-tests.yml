name: .NET Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./C#/2_PensionModelCSharp

      - name: Build
        run: dotnet build ./C#/2_PensionModelCSharp --no-restore

      - name: Run tests
        run: dotnet test ./C#/2_PensionModelCSharp/MyProject.Tests/MyProject.Tests.csproj --verbosity normal
